<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 로또 번호 추천기</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-bg"></div>

    <header class="top-ad-slot" aria-label="상단 광고 슬롯">
        <div class="ad-slot-inner">
            <span class="ad-label">AD SLOT TOP</span>
            <p>Google AdSense 상단 배너 영역 (728x90 / 반응형)</p>
        </div>
    </header>

    <main class="app-shell">
        <section class="hero-bar">
            <div>
                <p class="eyebrow">Lotto Intelligence Lab</p>
                <h1>AI 로또 번호 추천기</h1>
                <p class="hero-desc">완전 랜덤, 패턴 기반 AI, 어텐션 기반 AI를 비교해 번호를 추천받으세요.</p>
            </div>
            <button id="theme-btn" class="ghost-btn">다크 모드</button>
        </section>

        <section class="main-layout">
            <article class="container generator-section">
                <h2>번호 생성</h2>

                <div class="control-grid">
                    <div class="control-block">
                        <label for="num-sets">게임 수</label>
                        <select id="num-sets">
                            <option value="1">1게임</option>
                            <option value="2">2게임</option>
                            <option value="3">3게임</option>
                            <option value="4">4게임</option>
                            <option value="5">5게임</option>
                        </select>
                    </div>

                    <div class="control-block">
                        <label for="strategy-select">추천 방식</label>
                        <select id="strategy-select">
                            <option value="random">완전 랜덤</option>
                            <option value="ai_pattern">패턴 기반 AI (MLP)</option>
                            <option value="ai_attention">어텐션 기반 AI (Temporal)</option>
                        </select>
                    </div>
                </div>

                <p id="strategy-status" class="status-pill">모드 선택 후 번호 생성을 눌러주세요.</p>

                <div id="lotto-results-container"></div>
                <button id="generate-btn" class="primary-btn">번호 생성하기</button>
            </article>

            <article class="container history-section">
                <h2>당첨 기록</h2>
                <p class="history-note">표시는 최근 1년, AI 학습은 최근 5년 데이터 사용</p>
                <div id="history-container">
                    <p>최근 당첨 결과 로딩 중...</p>
                </div>
            </article>
        </section>
    </main>

    <footer class="bottom-ad-slot" aria-label="하단 광고 슬롯">
        <div class="ad-slot-inner">
            <span class="ad-label">AD SLOT BOTTOM</span>
            <p>Google AdSense 하단 배너 영역 (728x90 / 반응형)</p>
        </div>
    </footer>

    <script src="main.js"></script>
</body>
</html>
